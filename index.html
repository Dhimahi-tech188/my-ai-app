<!DOCTYPE html>
<html>
<head>
  <title>My AI App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 500px;
      margin: auto;
      background: white;
    }

    h1 {
      background: #222;
      color: white;
      margin: 0;
      padding: 15px;
      text-align: center;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .message {
      padding: 10px;
      margin: 5px 0;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e5e5ea;
    }

    .input-box {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>My AI App 🤖</h1>

  <div id="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value;

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("/ask", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  addMessage(data.reply, "bot");
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
